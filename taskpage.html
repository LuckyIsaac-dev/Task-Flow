<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/taskpage.css" />
    <title>Tasks</title>
  </head>
  <body>
    <main>
      <!-- OVERLAY CONTAINER AND SEARCH INPUT -->
      <div class="overlay-container hidden">
        <div class="overlay">
          <div class="">
            <input type="text" id="edited-tasks" placeholder="Edit Task" />
          </div>
          <button class="save">Save</button>
        </div>
      </div>

      <div class="search">
        <input type="text" placeholder="search for task" />
      </div>

      <div class="grid-container">
        <!-- NAV LINKS  -->
        <nav class="nav">
          <div class="nav-main-container">
            <div class="logo-container">
              <h1 class="logo-heading">
                <span class="task-logo">task</span>flow
              </h1>
            </div>

            <div class="nav-links">
              <img class="nav-icon" src="images/icons8-inbox-50.png" alt="" />
              <a href="">Inbox</a>
            </div>

            <div class="nav-links">
              <img class="nav-icon" src="images/icons8-today-50.png" alt="" />

              <a href="">Today</a>
            </div>
            <div class="nav-links">
              <img class="nav-icon" src="images/icons8-15-48.png" alt="" />

              <a href="">Upcoming</a>
            </div>
            <div class="nav-links">
              <img
                class="nav-icon"
                src="images/icons8-calendar-50.png"
                alt=""
              />

              <a href="">Calendar</a>
            </div>
            <div class="nav-links">
              <img
                class="nav-icon"
                src="images/icons8-analysis-50.png"
                alt=""
              />

              <a href="">Analysis</a>
            </div>
          </div>
        </nav>

        <div class="main-content">
          <h2 class="main-content-heading">Inbox</h2>
          <button class="add-task hidden">+ Add task</button>
          <div class="js-content"></div>
          <button class="js-add-button">
            <span class="plus-sign">+</span>
            <span class="button-placeholder">Add task</span>
          </button>
          <input type="text" id="todo" placeholder="+ Add task" />
        </div>
      </div>
    </main>
    <script src="scripts/task-page.js"></script>
  </body>
</html>
