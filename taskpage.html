<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/taskpage.css" />
    <title>Tasks</title>
  </head>
  <body>
    <main>
      <!-- OVERLAY CONTAINER AND SEARCH INPUT -->
      <div class="overlay-container hidden">
        <div class="overlay">
          <h5>Edit Task</h5>
          <div class="">
            <input type="text" id="editing-input" placeholder="Edit Task" />
          </div>
          <button class="save">Save</button>
        </div>
      </div>

      <div class="delete-overlay-container">
        <div class="delete-overlay">
          <h5>Delete task ?</h5>
          <p class="js-delete-task"></p>
          <div class="delete-button-container">
            <button class="cancel-delete">CANCEL</button>
            <button class="confirm-delete">DELETE</button>
          </div>
        </div>
      </div>

      <div class="search">
        <input type="text" placeholder="search for task" />
      </div>

      <!-- NAV LINKS  -->
      <nav class="nav">
        <!-- <div class="logo-container">
            <h1 class="logo-heading">
              <span class="task-logo">task</span>flow
            </h1>
          </div> -->

        <a href="taskpage.html" target="_blank">
          <div class="nav-links">
            <img class="nav-icon" src="images/icons8-inbox-50.png" alt="" />
            <span> Inbox </span>
          </div>
        </a>
        <a href="taskpage.html" target="_blank">
          <div class="nav-links">
            <img class="nav-icon" src="images/icons8-today-50.png" alt="" />
            <span> Today </span>
          </div>
        </a>
        <a href="taskpage.html" target="_blank">
          <div class="nav-links">
            <img class="nav-icon" src="images/icons8-15-48.png" alt="" />

            <span>Upcoming</span>
          </div>
        </a>
        <a href="taskpage.html" target="_blank">
          <div class="nav-links">
            <img class="nav-icon" src="images/icons8-calendar-50.png" alt="" />
            <span>Calender</span>
          </div>
        </a>
        <a href="taskpage.html" target="_blank">
          <div class="nav-links">
            <img class="nav-icon" src="images/icons8-analysis-50.png" alt="" />
            <span>Analysis</span>
          </div>
        </a>
      </nav>

      <div class="main-content">
        <h2 class="main-content-heading">Inbox</h2>

        <button class="add-task hidden">+ Add task</button>

        <div class="js-content"></div>

        <button class="render-card-button">
          <div class="plus-sign-background">
            <div class="plus-sign">
              <svg width="13" height="13">
                <path
                  fill="currentColor"
                  fill-rule="evenodd"
                  d="M6 6V.5a.5.5 0 0 1 1 0V6h5.5a.5.5 0 1 1 0 1H7v5.5a.5.5 0 1 1-1 0V7H.5a.5.5 0 0 1 0-1z"
                ></path>
              </svg>
            </div>
          </div>
          <div class="button-placeholder">Add task</div>
        </button>

        <div class="add-task-card">
          <h4 class="add-task-heading">Add New Task</h4>
          <input type="text" class="todo" placeholder="+ Add task" required />
          <button class="js-add-task">
            <div class="plus-sign-background">
              <div class="plus-sign">
                <svg width="13" height="13">
                  <path
                    fill="currentColor"
                    fill-rule="evenodd"
                    d="M6 6V.5a.5.5 0 0 1 1 0V6h5.5a.5.5 0 1 1 0 1H7v5.5a.5.5 0 1 1-1 0V7H.5a.5.5 0 0 1 0-1z"
                  ></path>
                </svg>
              </div>
            </div>
            <div class="button-placeholder">Add task</div>
          </button>
        </div>
      </div>
    </main>
    <script src="scripts/task-page.js"></script>
  </body>
</html>
